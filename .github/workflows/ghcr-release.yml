name: Publish Docker Image To GHCR

on:
  release:
    types: [published]
  workflow_dispatch:

env:
  IMAGE_NAME: ghcr.io/alexwoo-awso/rocketchat-exporter

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=ref,event=tag,enable=true
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
          labels: |
            org.opencontainers.image.title=Rocket.Chat Exporter
            org.opencontainers.image.description=CLI exporter for Rocket.Chat MongoDB messages with smart context-aware filtering and JSON or HTML output
            org.opencontainers.image.source=https://github.com/alexwoo-awso/rocketchat-exporter

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
